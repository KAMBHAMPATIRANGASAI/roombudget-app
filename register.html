<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - ExpSplit Pro</title>
  <style>
    :root {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: #0f172a;
      background: #f0f4f8;
      --teal: #0d9488;
      --surface: #ffffff;
      --border: #e2e8f0;
      --muted: #64748b;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #e2f8f4 0%, #f8fbff 100%);
    }

    .card {
      width: min(420px, 92vw);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.85rem;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
      margin: 0 0 1.75rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f8fafc;
      font-size: 1rem;
      color: #0f172a;
    }

    input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.12);
    }

    .button-row {
      display: grid;
      gap: 0.85rem;
      margin-top: 1.25rem;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0.95rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--teal);
      color: white;
      box-shadow: 0 12px 24px rgba(13, 148, 136, 0.18);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid var(--border);
    }

    .status-message {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid transparent;
      font-weight: 600;
    }

    .status-message.info { color: #0f172a; background: #e2f8f4; border-color: #bae6fd; }
    .status-message.success { color: #0f572f; background: #d1fae5; border-color: #10b981; }
    .status-message.error { color: #991b1b; background: #fee2e2; border-color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p>Register with your email and password to use ExpSplit Pro.</p>
    <p style="color: #334155; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem;">
      Enter your email and password to create your account. The page uses Firebase v10 modular auth and Firestore.
    </p>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>

      <div class="button-row">
        <button type="button" id="registerBtn" class="btn-primary">Register</button>
        <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">Back to Login</button>
      </div>

      <div id="statusMessage" class="status-message info">Fill out the form and click Register.</div>
    </form>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
